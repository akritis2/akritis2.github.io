<!DOCTYPE html>
<html>
<head>
    <title>CODEC | Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="content-wrapper">
        <h1>Meeting Blog</h1>
        <p style="text-align: center; font-style: italic;">Check out what we've been up to.</p>

        <div id="events-list" class="events-grid" aria-live="polite">
            <!-- Event cards will be populated here from events.json -->
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function(){
        const list = document.getElementById('events-list');
        fetch('events.json')
            .then(r => r.json())
            .then(events => {
                if(!Array.isArray(events) || events.length === 0){
                    list.innerHTML = '<p>No events found.</p>';
                    return;
                }
                events.forEach(ev => {
                    const card = document.createElement('article');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <div class="card-inner">
                            <div class="post-header">
                                <span class="date">${ev.date}</span>
                                ${ev.tag ? `<span class="tag">${ev.tag}</span>` : ''}
                            </div>
                            <h2>${ev.title}</h2>
                            <p class="summary">${ev.summary}</p>
                        </div>
                        <div class="overlay">
                            <a class="details-btn" href="event-detail.html?id=${ev.id}}">See details</a>
                        </div>
                    `;

                    card.addEventListener('click', function(e){
                        if(e.target.closest('.details-btn')) return; // allow link clicks
                        card.classList.toggle('dimmed');
                    });

                    list.appendChild(card);
                });
            })
            .catch(err => {
                console.error(err);
                list.innerHTML = '<p>Could not load events.</p>';
            });
    });
    </script>

    <script src="components.js"></script>
</body>
</html>
